<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>招鑫539</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #FFD700;
    --gold-light: #FFF0A0;
    --gold-dark: #B8860B;
    --red: #CC0000;
    --red-dark: #8B0000;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #0a1628 0%, #000814 100%);
    overflow: hidden;
    font-family: 'Noto Serif TC', serif;
  }

  /* Particle stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: var(--gold);
    animation: twinkle var(--d) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1); }
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 20px;
  }

  /* Image glow ring */
  .image-wrapper {
    position: relative;
    width: min(420px, 88vw);
    height: min(420px, 88vw);
    animation: floatUp 3s ease-in-out infinite;
  }

  .image-wrapper::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: conic-gradient(
      var(--gold), var(--gold-light), var(--gold), #FFA500, var(--gold-dark), var(--gold), var(--gold-light), var(--gold)
    );
    animation: spinRing 4s linear infinite;
    z-index: -1;
  }

  .image-wrapper::after {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    box-shadow:
      0 0 40px 15px rgba(255, 215, 0, 0.5),
      0 0 80px 30px rgba(255, 100, 0, 0.3),
      0 0 120px 50px rgba(200, 0, 0, 0.2);
    animation: pulseGlow 2s ease-in-out infinite;
    z-index: -2;
    border-radius: 50%;
  }

  @keyframes spinRing {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes floatUp {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
  }

  @keyframes pulseGlow {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  .lucky-cat-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }

  /* Coins scattered around */
  .coin {
    position: absolute;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--gold-light), var(--gold-dark));
    border: 2px solid var(--gold);
    box-shadow: 0 0 8px rgba(255,215,0,0.8);
    animation: coinSpin var(--d) ease-in-out infinite, floatCoin var(--d2) ease-in-out infinite;
  }

  @keyframes coinSpin {
    0%, 100% { transform: rotateY(0deg); }
    50% { transform: rotateY(180deg); }
  }
  @keyframes floatCoin {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* LINE Button */
  .btn-wrapper {
    margin-top: 28px;
    position: relative;
  }

  .line-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 44px;
    background: linear-gradient(135deg, #06C755 0%, #00A040 50%, #009935 100%);
    border: none;
    border-radius: 60px;
    text-decoration: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 3px var(--gold),
      0 0 0 5px rgba(255,215,0,0.3),
      0 8px 32px rgba(6, 199, 85, 0.5),
      0 16px 48px rgba(0,0,0,0.4);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    animation: btnPulse 2.5s ease-in-out infinite;
  }

  .line-btn::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 40%;
    height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transform: skewX(-20deg);
    animation: shimmer 2.5s ease-in-out infinite;
  }

  @keyframes shimmer {
    0% { left: -60%; }
    100% { left: 140%; }
  }

  @keyframes btnPulse {
    0%, 100% {
      box-shadow:
        0 0 0 3px var(--gold),
        0 0 0 5px rgba(255,215,0,0.3),
        0 8px 32px rgba(6, 199, 85, 0.5),
        0 16px 48px rgba(0,0,0,0.4);
    }
    50% {
      box-shadow:
        0 0 0 3px var(--gold-light),
        0 0 0 10px rgba(255,215,0,0.2),
        0 8px 48px rgba(6, 199, 85, 0.8),
        0 16px 64px rgba(0,0,0,0.5);
    }
  }

  .line-btn:hover {
    transform: translateY(-3px) scale(1.04);
  }
  .line-btn:active {
    transform: translateY(0) scale(0.98);
  }

  .line-icon {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }

  .btn-text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1.2;
  }

  .btn-main {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    letter-spacing: 2px;
  }

  .btn-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    letter-spacing: 1px;
    font-weight: 400;
  }

  /* Gold sparkles */
  .sparkle {
    position: absolute;
    pointer-events: none;
    color: var(--gold);
    font-size: 18px;
    animation: sparkleAnim var(--d) ease-in-out infinite;
    opacity: 0;
  }

  @keyframes sparkleAnim {
    0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1) rotate(180deg); }
  }
</style>
</head>
